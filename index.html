<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarite - Créer un compte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="register-form" class="glass-card">
            <h1 class="title">Créer un compte</h1>
            <p class="subtitle">Scholarite - Gestion Primaire</p>
            
            <div class="input-group">
                <label>Nom complet</label>
                <input type="text" id="reg-name" placeholder="Ex: Jean Dupont">
            </div>

            <div class="input-group">
                <label>Adresse Email</label>
                <input type="email" id="reg-email" placeholder="directeur@ecole.com">
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="reg-password" placeholder="••••••••">
            </div>

            <button class="btn btn-gold" onclick="handleRegister()">Créer le compte</button>
            <p class="footer-text">Déjà membre ? <span class="link" onclick="toggleForm()">Se connecter</span></p>
        </div>

        <div id="login-form" class="glass-card hidden">
            <h1 class="title">Connexion</h1>
            <p class="subtitle">Accédez à votre espace</p>
            
            <div class="input-group">
                <label>Nom d'utilisateur</label>
                <input type="text" id="login-name" placeholder="Votre nom">
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>

            <button class="btn btn-black" onclick="handleLogin()">Se connecter</button>
            <p class="footer-text">Nouveau ici ? <span class="link" onclick="toggleForm()">Créer un compte</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
