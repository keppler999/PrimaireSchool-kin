<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarite - Créer un compte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="register-form" class="form-card">
            <h2 class="gold-text">Créer un compte</h2>
            <p class="subtitle">Rejoignez l'écosystème Scholarite</p>
            
            <div class="input-group">
                <label>Nom complet</label>
                <input type="text" placeholder="Ex: Jean Mukendi">
            </div>
            
            <div class="input-group">
                <label>Adresse Email</label>
                <input type="email" placeholder="nom@exemple.com">
            </div>
            
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" placeholder="••••••••">
            </div>
            
            <button class="btn-main">CRÉER</button>
            <p class="switch-text">Déjà inscrit ? <span onclick="toggleForm()">Se connecter</span></p>
        </div>

        <div id="login-form" class="form-card hidden">
            <h2 class="gold-text">Se connecter</h2>
            <p class="subtitle">Bon retour sur Scholarite</p>
            
            <div class="input-group">
                <label>Nom complet</label>
                <input type="text" placeholder="Entrez votre nom">
            </div>
            
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" placeholder="••••••••">
            </div>
            
            <button class="btn-main">SE CONNECTER</button>
            <p class="switch-text">Nouveau ici ? <span onclick="toggleForm()">Créer un compte</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
