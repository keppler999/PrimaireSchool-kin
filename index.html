<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarite - Se connecter</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="glass-container">
        <form id="auth-form" class="glass-form">
            <h1>Scholarite</h1>
            <h2>Se connecter</h2>
            
            <div class="input-group">
                <label for="username">Nom complet</label>
                <input type="text" id="username" placeholder="Ex: Jean Dupont" required>
            </div>

            <div class="input-group">
                <label for="email">Adresse Email</label>
                <input type="email" id="email" placeholder="email@exemple.com" required>
            </div>

            <div class="input-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="button-group">
                <button type="submit" id="btn-login" class="btn-primary">Se connecter</button>
                <button type="button" id="btn-signup" class="btn-secondary">Créer un compte</button>
            </div>
            
            <p id="message" class="status-message"></p>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
