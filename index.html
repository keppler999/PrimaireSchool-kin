<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarite - Créer un compte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <div class="form-card" id="auth-card">
            <h2 id="form-title">Créer un compte</h2>
            <p id="form-subtitle">Bienvenue sur Scholarite</p>

            <form id="auth-form">
                <div class="input-group" id="name-group">
                    <label for="username">Nom complet</label>
                    <input type="text" id="username" placeholder="Ex: Jean Mukendi" required>
                </div>

                <div class="input-group" id="email-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" placeholder="nom@exemple.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-main" id="submit-btn">Créer le compte</button>
            </form>

            <div class="divider">ou</div>

            <button class="btn-secondary" id="toggle-btn">Déjà un compte ? Se connecter</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
