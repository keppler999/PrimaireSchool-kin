<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarite - Ultra Glass Edition</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="glass-master-overlay"></div>

    <nav class="sidebar-cyber">
        <div class="logo-zone">
            <div class="logo-circle" id="logo-trigger">
                <img id="school-logo" src="" alt="">
                <i class="fas fa-school"></i>
            </div>
            <input type="file" id="logo-input" hidden>
        </div>
        <ul class="nav-stickers">
            <li class="active"><i class="fas fa-th-large"></i></li>
            <li><i class="fas fa-user-graduate"></i></li>
            <li><i class="fas fa-users-cog"></i></li>
            <li><i class="fas fa-university"></i></li>
            <li><i class="fas fa-book-open"></i></li>
            <li><i class="fas fa-chalkboard-teacher"></i></li>
            <li><i class="fas fa-file-invoice"></i></li>
            <li><i class="fas fa-wallet"></i></li>
            <li><i class="fas fa-user-tie"></i></li>
            <li><i class="fas fa-user-circle"></i></li>
            <li><i class="fas fa-cog"></i></li>
        </ul>
    </nav>

    <main class="main-screen">
        <header class="top-bar">
            <h1 class="main-title">SCHOLARITE</h1>
            <div class="global-stats-card">
                <canvas id="mainChart"></canvas>
            </div>
        </header>

        <div class="grid-container">
            <div class="glass-card">
                <div class="pin"></div>
                <h3><i class="fas fa-user-graduate"></i> Casier Élève</h3>
                <div class="data-row">Total: <span class="txt-yellow">450</span></div>
                <div class="data-row">Présents: <span class="txt-green">412</span></div>
                <div class="data-row">Absents: <span class="txt-red">38</span></div>
            </div>

            <div class="glass-card scroll">
                <div class="pin"></div>
                <h3><i class="fas fa-users-cog"></i> Personnel</h3>
                <div class="loop-box" id="loop-personnel"></div>
            </div>

            <div class="glass-card scroll">
                <div class="pin"></div>
                <h3><i class="fas fa-university"></i> Académie</h3>
                <div class="loop-box" id="loop-academie"></div>
            </div>

            <div class="glass-card scroll">
                <div class="pin"></div>
                <h3><i class="fas fa-book"></i> Matières</h3>
                <div class="loop-box" id="loop-matieres"></div>
            </div>

            <div class="glass-card scroll">
                <div class="pin"></div>
                <h3><i class="fas fa-chalkboard-teacher"></i> Enseignants</h3>
                <div class="loop-box" id="loop-profs"></div>
            </div>

            <div class="glass-card scroll">
                <div class="pin"></div>
                <h3><i class="fas fa-star"></i> Notes %</h3>
                <div class="loop-box" id="loop-notes"></div>
            </div>

            <div class="glass-card">
                <div class="pin"></div>
                <h3><i class="fas fa-clock"></i> Emploi du Temps</h3>
                <div class="data-row">Cours prévus: <span class="txt-gold">12</span></div>
                <div class="data-row">Exécutés: <span class="txt-green">08</span></div>
                <div class="data-row">Restants: <span class="txt-red">04</span></div>
            </div>

            <div class="glass-card scroll">
                <div class="pin"></div>
                <h3><i class="fas fa-money-bill-wave"></i> Finances</h3>
                <div class="loop-box" id="loop-finances"></div>
            </div>

            <div class="glass-card scroll">
                <div class="pin"></div>
                <h3><i class="fas fa-user-tie"></i> Staff</h3>
                <div class="loop-box" id="loop-staff"></div>
            </div>

            <div class="glass-card profile">
                <div class="pin"></div>
                <div class="profile-content">
                    <div>
                        <small>Utilisateur</small>
                        <h4 id="user-name">Kambale Jean</h4>
                    </div>
                    <div class="black-sticker-circle"><i class="fas fa-user"></i></div>
                </div>
            </div>
        </div>
    </main>

    <script src="dashboard-app.js"></script>
</body>
</html>
