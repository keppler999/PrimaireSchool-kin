<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHOLARITE - Ultra Glass UI</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="full-screen-blur"></div>

    <nav class="sidebar-stickers">
        <div class="school-brand">
            <div class="logo-box">
                <img id="school-logo" src="" alt="">
                <label for="logo-input"><i class="fas fa-camera"></i></label>
                <input type="file" id="logo-input" hidden>
            </div>
        </div>
        <div class="sticker-list">
            <div class="sticker active"><i class="fas fa-th-large"></i></div>
            <div class="sticker"><i class="fas fa-user-graduate"></i></div>
            <div class="sticker"><i class="fas fa-users-cog"></i></div>
            <div class="sticker"><i class="fas fa-university"></i></div>
            <div class="sticker"><i class="fas fa-broadcast-tower"></i></div>
            <div class="sticker"><i class="fas fa-chalkboard-teacher"></i></div>
            <div class="sticker"><i class="fas fa-file-invoice"></i></div>
            <div class="sticker"><i class="fas fa-wallet"></i></div>
            <div class="sticker"><i class="fas fa-user-tie"></i></div>
            <div class="sticker"><i class="fas fa-user-circle"></i></div>
            <div class="sticker"><i class="fas fa-cog"></i></div>
        </div>
    </nav>

    <main class="dashboard-core">
        <header class="glass-header">
            <div class="title-group">
                <h1>SCHOLARITE</h1>
                <span class="live-tag">● LIVE STATS</span>
            </div>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </header>

        <div class="ultra-grid">
            
            <div class="glass-card">
                <div class="gold-pin"></div>
                <h3><i class="fas fa-user-graduate"></i> Casier Élève</h3>
                <div class="data-block">
                    <div class="val">Total: <span class="txt-yellow">450</span></div>
                    <div class="val">Présents: <span class="txt-green">412</span></div>
                    <div class="val">Absents: <span class="txt-red">38</span></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="gold-pin"></div>
                <h3>Personnel</h3>
                <div class="step-window">
                    <div class="step-track" id="track-personnel"></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="gold-pin"></div>
                <h3>Académie</h3>
                <div class="step-window">
                    <div class="step-track" id="track-academie"></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="gold-pin"></div>
                <h3>Live Cours</h3>
                <div class="step-window">
                    <div class="step-track" id="track-live"></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="gold-pin"></div>
                <h3>Enseignants</h3>
                <div class="step-window">
                    <div class="step-track" id="track-teachers"></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="gold-pin"></div>
                <h3>Notes %</h3>
                <div class="step-window">
                    <div class="step-track" id="track-notes"></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="gold-pin"></div>
                <h3>Emploi du temps</h3>
                <div class="data-block">
                    <div class="val">Prévus: <span>08</span></div>
                    <div class="val">Exécutés: <span class="txt-green">05</span></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="gold-pin"></div>
                <h3>Finances</h3>
                <div class="step-window">
                    <div class="step-track" id="track-finances"></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="gold-pin"></div>
                <h3>Staff</h3>
                <div class="step-window">
                    <div class="step-track" id="track-staff"></div>
                </div>
            </div>

            <div class="glass-card"><div class="gold-pin"></div><h3>Alertes</h3><p>Rien à signaler</p></div>
            <div class="glass-card"><div class="gold-pin"></div><h3>Calendrier</h3><p>Réunion 14h</p></div>

            <div class="glass-card profile">
                <div class="gold-pin"></div>
                <div class="profile-layout">
                    <div class="user-txt">
                        <small>Utilisateur</small>
                        <h2 id="display-name">Kambale Jean</h2>
                    </div>
                    <div class="black-sticker-circle">
                        <i class="fas fa-user-shield"></i>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="dashboard-app.js"></script>
</body>
</html>
