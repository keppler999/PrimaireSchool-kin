<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHOLARITE - Ultra Dashboard</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="full-glass-overlay"></div>

    <div class="main-container">
        <header class="ultra-header">
            <div class="brand">
                <h1>SCHOLARITE</h1>
                <p>Système de Gestion Intégré</p>
            </div>
            <div class="stats-summary">
                <canvas id="globalChart"></canvas>
            </div>
        </header>

        <main class="ultra-grid">
            <div class="pin-card">
                <div class="pin"></div>
                <h3><i class="fas fa-user-graduate"></i> Casier Élève</h3>
                <div class="step-ticker">
                    <div class="step-content">
                        <div class="step-item">Total: <span class="txt-gold">450</span></div>
                        <div class="step-item">Présents: <span class="txt-green">412</span></div>
                        <div class="step-item">Absents: <span class="txt-red">38</span></div>
                    </div>
                </div>
            </div>

            <div class="pin-card">
                <div class="pin"></div>
                <h3><i class="fas fa-users-cog"></i> Personnel</h3>
                <div class="step-ticker">
                    <div class="step-content">
                        <div class="step-item txt-green">M. Alain (P)</div>
                        <div class="step-item txt-red">Mme Sarah (A)</div>
                        <div class="step-item txt-blue">M. Robert (V)</div>
                    </div>
                </div>
            </div>

            <div class="pin-card">
                <div class="pin"></div>
                <h3><i class="fas fa-sitemap"></i> Académie</h3>
                <div class="step-ticker">
                    <div class="step-content">
                        <div class="step-item">6e A: <span class="txt-yellow">12F</span> / <span class="txt-blue-l">15G</span></div>
                        <div class="step-item">5e B: <span class="txt-yellow">18F</span> / <span class="txt-blue-l">10G</span></div>
                    </div>
                </div>
            </div>

            </main>

        <footer class="ultra-footer">
            <div class="user-profile-sticker">
                <div class="user-info">
                    <span class="name">Jean Dupont</span>
                    <span class="role">Administrateur</span>
                </div>
                <div class="black-sticker">
                    <i class="fas fa-user"></i>
                </div>
            </div>
        </footer>
    </div>

    <script src="dashboard-app.js"></script>
</body>
</html>
